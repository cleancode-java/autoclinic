<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cecauto - Book Appointment</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-slate-50 font-sans">



<header class="bg-gradient-to-r from-[#313b47] to-cyan-800 h-20 flex items-center">

    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">


        <!-- LOGO -->
        <a href="index.html">
            <img 
            src="image/logo.png"
            alt="Cecauto AutoClinic logo"
            class="h-12">
        </a>



        <!-- NAV -->
        <div class="flex items-center gap-4">
            <a 
            href="index.html"
            data-i18n="back_home"
            class="text-white hover:text-cyan-300 transition">
                Back Home
            </a>



            <select 
            id="lang-select"
            class="bg-[#313b47] text-white border border-cyan-600 rounded-lg px-2 py-1">

                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="uk">UK</option>

            </select>


        </div>


    </div>


</header>





<section class="min-h-screen py-16">


<div class="max-w-3xl mx-auto px-6">



<h1 
data-i18n="booking_title"
class="text-4xl font-bold text-slate-900 mb-3">

Book Appointment

</h1>



<p 
data-i18n="booking_description"
class="text-slate-600 mb-10">

Fill in the details and we will contact you via WhatsApp.

</p>





<form 
id="booking-form"
class="bg-white rounded-3xl shadow-xl p-8 space-y-5">






<!-- NAME -->

<div>

<label 
data-i18n="booking_name"
class="block text-sm font-semibold mb-2">

Name

</label>


<input

id="client-name"

required

class="w-full border rounded-xl px-4 py-3"

data-i18n-placeholder="booking_name_placeholder"

placeholder="Juan Perez">

</div>







<!-- PHONE -->

<div>

<label 
data-i18n="booking_phone"
class="block text-sm font-semibold mb-2">

Phone

</label>


<input

id="client-phone"

required

class="w-full border rounded-xl px-4 py-3"

placeholder="+34 600 000 000">

</div>









<!-- CAR -->

<div class="grid md:grid-cols-2 gap-4">


<div>


<label 
data-i18n="booking_car"
class="block text-sm font-semibold mb-2">

Brand / Model

</label>


<input

id="car-model"

required

class="w-full border rounded-xl px-4 py-3"

placeholder="Seat Leon">


</div>





<div>


<label 
data-i18n="booking_plate"
class="block text-sm font-semibold mb-2">

Matrícula

</label>


<input

id="car-plate"

required

class="w-full border rounded-xl px-4 py-3"

placeholder="1234ABC">


</div>


</div>









<!-- SERVICE -->

<div>


<label 
data-i18n="booking_service"
class="block text-sm font-semibold mb-2">

Service

</label>



<select
id="service-type"
aria-label="Select service"
class="w-full border rounded-xl px-4 py-3">


<option data-i18n="service_oil">
Maintenance & Oil Change
</option>


<option data-i18n="service_diagnostic">
Computer Diagnostics
</option>


<option data-i18n="service_brakes">
Brake Repair
</option>


<option data-i18n="service_engine">
Engine Repair
</option>


</select>


</div>









<!-- DATE TIME -->

<div class="grid md:grid-cols-2 gap-4">


<div>


<label
for="booking-date"
data-i18n="booking_date"
class="block text-sm font-semibold mb-2">
Date
</label>



<input
type="date"
id="booking-date"
class="w-full border rounded-xl px-4 py-3">

</div>





<div>


<label
for="booking-time"
data-i18n="booking_time"
class="block text-sm font-semibold mb-2">
Time
</label>



<input
type="time"
id="booking-time"
class="w-full border rounded-xl px-4 py-3">

</div>

</div>









<!-- DESCRIPTION -->


<div>


<label 
data-i18n="booking_problem"
class="block text-sm font-semibold mb-2">

Problem description

</label>



<textarea

id="issue-desc"

rows="4"

class="w-full border rounded-xl px-4 py-3"

data-i18n-placeholder="problem_placeholder"

placeholder="Describe the problem...">

</textarea>


</div>









<button

type="submit"

data-i18n="booking_button"

class="
w-full
bg-gradient-to-r
from-[#313b47]
to-cyan-700
text-white
font-bold
py-4
rounded-xl
hover:opacity-90
transition">

Confirm Appointment

</button>





</form>


</div>


</section>







<script src="js/translations.js"></script>
<script src="js/language.js"></script>
<script src="js/booking.js"></script>



</body>

</html>
